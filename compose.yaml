services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development

  vite:
    image: node:22-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - .:/app
      - vite_node_modules:/app/node_modules
    ports:
      - "5173:5173"

  rss-worker:
    build:
      context: .
      dockerfile: rss_worker/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      - DJANGO_BASE_URL=http://web:8000
      - WORKER_API_TOKEN=${WORKER_API_TOKEN:-}
      - WORKER_CHECK_INTERVAL_SECONDS=3600
    depends_on:
      - web
    restart: unless-stopped

volumes:
  vite_node_modules:
