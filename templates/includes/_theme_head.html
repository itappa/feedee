<script>
    (function() {
        try {
            var preferred = localStorage.getItem('feedee-theme') || '{{ theme_preference|default:"system"|escapejs }}' || 'system';
            var resolved = preferred === 'system'
                ? (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
                : preferred;
            var root = document.documentElement;
            root.dataset.theme = preferred;
            root.classList.toggle('theme-dark', resolved === 'dark');
            root.classList.toggle('theme-light', resolved !== 'dark');
        } catch (e) {}
    })();
</script>
<style>
    :root { color-scheme: light; }
    html.theme-dark { color-scheme: dark; }
    html.theme-dark body,
    html.theme-dark main { background-color: #0b1220 !important; color: #e5e7eb !important; }
    html.theme-dark header,
    html.theme-dark aside,
    html.theme-dark .bg-white,
    html.theme-dark .bg-gray-50,
    html.theme-dark .bg-gray-50\/50 { background-color: #111827 !important; }
    html.theme-dark .border-gray-100,
    html.theme-dark .border-gray-200 { border-color: #334155 !important; }
    html.theme-dark .text-gray-900 { color: #f8fafc !important; }
    html.theme-dark .text-gray-700,
    html.theme-dark .text-gray-600,
    html.theme-dark .text-gray-500 { color: #cbd5e1 !important; }
    html.theme-dark .text-gray-400 { color: #94a3b8 !important; }
    html.theme-dark input,
    html.theme-dark select,
    html.theme-dark textarea { background-color: #0f172a !important; color: #f8fafc !important; border-color: #334155 !important; }
</style>
