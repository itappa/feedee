{# Shared page header row component #}
<div class="flex flex-wrap items-center justify-between gap-3 mb-6">
    <div>
        <h1 class="text-2xl font-bold text-gray-900">{{ title }}</h1>
        {% if subtitle %}
        <p class="text-sm text-gray-500 mt-1">{{ subtitle }}</p>
        {% endif %}
    </div>
    {% if action_label %}
        {% if action_url %}
        <a href="{{ action_url }}"
           class="rounded-lg bg-brand-600 hover:bg-brand-700 text-white text-sm font-medium px-4 py-2 transition-colors shadow-sm">
            <svg class="w-4 h-4 inline -mt-0.5 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 4v16m8-8H4"/></svg>
            {{ action_label }}
        </a>
        {% elif action_modal_id %}
        <button onclick="document.getElementById('{{ action_modal_id }}').showModal();"
                class="rounded-lg bg-brand-600 hover:bg-brand-700 text-white text-sm font-medium px-4 py-2 transition-colors shadow-sm">
            <svg class="w-4 h-4 inline -mt-0.5 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 4v16m8-8H4"/></svg>
            {{ action_label }}
        </button>
        {% endif %}
    {% endif %}
</div>
